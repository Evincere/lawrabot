# Configuración de Aplicación
spring.application.name=divorce-mcp-server
server.port=8081

# Configuración del servidor MCP
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.name=LawraBot-Divorce-Service
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE

# Conexión a Base de Datos (PGVector en Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/lawrabot_db
spring.datasource.username=postgres
spring.datasource.password=postgres_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Redis (Sesiones)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Configuración OLLAMA CLOUD (Vía Adaptador OpenAI)
# Usando OpenAI starter para soportar la autenticación Bearer de Ollama Cloud
spring.ai.openai.base-url=https://ollama.com
spring.ai.openai.api-key=${OLLAMA_CLOUD_API_KEY:tu_clave_aqui}
spring.ai.openai.chat.options.model=gpt-oss:120b

# Logging
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.com.lawrabot=INFO
