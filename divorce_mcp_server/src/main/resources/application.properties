# Configuración de Aplicación
spring.application.name=divorce-mcp-server
server.port=8081
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=false

# Configuración de Archivos
lawrabot.storage.evidence-path=./storage/evidences


# Configuración del servidor MCP (Red/SSE)
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=LawraBot-Divorce-Service
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=ASYNC
spring.ai.mcp.server.protocol=SSE
# Rutas explícitas para el cliente Node
spring.ai.mcp.server.sse-endpoint=/mcp/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Conexión a Base de Datos (PGVector en Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/lawrabot_db
spring.datasource.username=postgres
spring.datasource.password=postgres_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.check_nullability=false
spring.jpa.properties.hibernate.validator.apply_to_ddl=false
spring.ai.vectorstore.pgvector.initialize-schema=true

# Configuración de Redis (Sesiones)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Configuración OLLAMA CLOUD (Vía Adaptador OpenAI)
# Usando OpenAI starter para soportar la autenticación Bearer de Ollama Cloud
spring.ai.openai.base-url=https://ollama.com
spring.ai.openai.api-key=${OLLAMA_CLOUD_API_KEY:tu_clave_aqui}
#spring.ai.openai.chat.options.model=gpt-oss:120b
spring.ai.openai.chat.options.model=gemini-3-flash-preview:cloud
# Embeddings Locales (HuggingFace Transformers - ONNX)
# Este modelo corre 100% en tu equipo, sin llamadas externas.
# spring.ai.embedding.transformer.tokenizer.uri=... (opcional)


# Configuración de Credenciales Portal BLSG
blsg.portal.username=${BLSG_USER:spereyra@jus.mendoza.gov.ar}
blsg.portal.password=${BLSG_PASS:Pasar$1235}
blsg.portal.headless=true
blsg.portal.timeout-ms=${BLSG_TIMEOUT_MS:35000}

# Logging
logging.level.org.springframework.ai.mcp=INFO
logging.level.com.lawrabot=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
