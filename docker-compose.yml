version: '3.8'

services:
  # Base de Datos con Soporte Vectorial para RAG Legal
  db:
    image: pgvector/pgvector:pg17 
    container_name: lawrabot-db
    restart: always
    environment:
      POSTGRES_DB: lawrabot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password 
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Gestión de Sesiones y Cache (WhatsApp Sessions)
  redis:
    image: redis:alpine
    container_name: lawrabot-redis
    restart: always
    ports:
      - "6379:6379"

  # Interfaz Visual para Redis
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: lawrabot-redisinsight
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - redis

  # Herramienta Visual para Postgres
  db-adminer:
    image: adminer
    container_name: lawrabot-adminer
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - db

volumes:
  postgres_data:
